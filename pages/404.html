<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Oops Page Not Found | Nova Nest Retreats</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Nova Nest Retreats and discover your next luxury escape.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --emerald: #10b981;
            --emerald-light: #34d399;
            --ocean: #0ea5e9;
            --purple: #8b5cf6;
            --bg: #020617;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #f1f5f9;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==================
           CANVAS PARTICLES
        ================== */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ==================
           AMBIENT GLOWS
        ================== */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
        }
        .glow-emerald {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(16,185,129,0.14) 0%, transparent 65%);
            top: -100px; left: -100px;
            animation: orbDrift 14s ease-in-out infinite alternate;
        }
        .glow-ocean {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 65%);
            bottom: -80px; right: -80px;
            animation: orbDrift2 18s ease-in-out infinite alternate;
        }
        .glow-purple {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 65%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: orbPulse 8s ease-in-out infinite;
        }
        @keyframes orbDrift { from{transform:translate(0,0);} to{transform:translate(60px,40px);} }
        @keyframes orbDrift2 { from{transform:translate(0,0);} to{transform:translate(-40px,-60px);} }
        @keyframes orbPulse { 0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1);} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.2);} }

        /* ==================
           FLOATING SPARKS
        ================== */
        .spark {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            animation: sparkFloat linear infinite;
        }
        @keyframes sparkFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ==================
           MAIN CARD
        ================== */
        .page-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem 1.5rem;
            max-width: 700px;
            width: 100%;
        }

        /* ==================
           LOGO
        ================== */
        .logo-link {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            text-decoration: none;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeDown 0.6s ease 0.2s forwards;
        }
        .logo-icon { width: 34px; height: 34px; }
        .logo-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            color: white;
        }

        /* ==================
           BIG 404 TEXT
        ================== */
        .error-number {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(7rem, 18vw, 11rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #10b981 0%, #34d399 30%, #0ea5e9 60%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(16,185,129,0.25));
            position: relative;
            opacity: 0;
            animation: scaleIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
            margin-bottom: 0.5rem;
            user-select: none;
        }

        /* Glitch effect on 404 */
        .error-number::before,
        .error-number::after {
            content: '404';
            position: absolute;
            top: 0; left: 0; right: 0;
            background: linear-gradient(135deg, #10b981, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .error-number::before {
            animation: glitch1 4s infinite;
            clip-path: polygon(0 25%, 100% 25%, 100% 35%, 0 35%);
        }
        .error-number::after {
            animation: glitch2 4s infinite 0.1s;
            clip-path: polygon(0 65%, 100% 65%, 100% 75%, 0 75%);
        }
        @keyframes glitch1 {
            0%,90%,100% { transform: translate(0); opacity: 0; }
            91% { transform: translate(-3px,1px); opacity: 0.7; }
            93% { transform: translate(3px,-1px); opacity: 0.5; }
            95% { transform: translate(0); opacity: 0; }
        }
        @keyframes glitch2 {
            0%,88%,100% { transform: translate(0); opacity: 0; }
            89% { transform: translate(3px,2px); opacity: 0.6; }
            91% { transform: translate(-3px,-1px); opacity: 0.4; }
            93% { transform: translate(0); opacity: 0; }
        }

        /* ==================
           ILLUSTRATION
        ================== */
        .illustration {
            width: 100%;
            max-width: 340px;
            margin: 0.5rem auto 1.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
        }
        .island-float { animation: islandFloat 4.5s ease-in-out infinite; }
        .compass-spin { animation: compassSpin 6s ease-in-out infinite; transform-origin: 230px 90px; }
        .search-bob { animation: searchBob 3s ease-in-out infinite; transform-origin: 160px 100px; }
        .signal-1 { animation: signalPulse 2s ease-in-out infinite; }
        .signal-2 { animation: signalPulse 2s ease-in-out infinite 0.35s; }
        .signal-3 { animation: signalPulse 2s ease-in-out infinite 0.7s; }
        @keyframes islandFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        @keyframes compassSpin { 0%,100%{transform:rotate(-25deg);} 50%{transform:rotate(25deg);} }
        @keyframes searchBob { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-8px) rotate(-8deg);} }
        @keyframes signalPulse { 0%,100%{opacity:0.1;} 50%{opacity:0.7;} }

        /* ==================
           TEXT CONTENT
        ================== */
        .error-title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 800;
            color: white;
            margin-bottom: 0.85rem;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.65s forwards;
        }
        .error-desc {
            color: rgba(148,163,184,0.75);
            font-size: 0.95rem;
            line-height: 1.75;
            max-width: 420px;
            margin: 0 auto 2.5rem;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.75s forwards;
        }

        /* ==================
           LINKS / BUTTONS
        ================== */
        .action-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.85s forwards;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--emerald), var(--ocean));
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 8px 32px rgba(16,185,129,0.3);
            position: relative;
            overflow: hidden;
        }
        .btn-home::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }
        .btn-home:hover::before { left: 100%; }
        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 16px 48px rgba(16,185,129,0.4); }
        .btn-home svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2.5; }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.75rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(226,232,240,0.8);
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(8px);
        }
        .btn-back:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color: white; transform: translateY(-2px); }
        .btn-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* ==================
           QUICK LINKS
        ================== */
        .quick-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            opacity: 0;
            animation: fadeUp 0.7s ease 1s forwards;
        }
        .quick-link {
            padding: 0.4rem 1.1rem;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: rgba(148,163,184,0.7);
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .quick-link:hover {
            background: rgba(16,185,129,0.1);
            border-color: rgba(16,185,129,0.3);
            color: var(--emerald-light);
            transform: translateY(-2px);
        }

        /* ==================
           KEYFRAMES
        ================== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.7); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { overflow: auto; }
            .action-row { flex-direction: column; align-items: center; }
            .btn-home, .btn-back { width: 100%; justify-content: center; }
        }
    </style>
</head>

    <script>
        /* ---- Canvas Particle System ---- */
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        let W, H, particles = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function createParticles(n) {
            particles = [];
            for (let i = 0; i < n; i++) {
                particles.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 2 + 0.5,
                    vx: (Math.random() - 0.5) * 0.35,
                    vy: (Math.random() - 0.5) * 0.35,
                    alpha: Math.random() * 0.4 + 0.1,
                    color: Math.random() < 0.6 ? '52,211,153' : Math.random() < 0.5 ? '14,165,233' : '139,92,246'
                });
            }
        }
        createParticles(80);

        function drawParticles() {
            ctx.clearRect(0, 0, W, H);

            // Draw connecting lines
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 90) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(52,211,153,${0.05 * (1 - dist/90)})`;
                        ctx.lineWidth = 0.7;
                        ctx.stroke();
                    }
                }
            }

            // Draw particles
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
                ctx.fill();

                // Glow on some
                if (p.r > 1.5) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(${p.color},${p.alpha * 0.2})`;
                    ctx.fill();
                }

                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = W;
                if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H;
                if (p.y > H) p.y = 0;
            });

            requestAnimationFrame(drawParticles);
        }

        drawParticles();

        /* ---- Mouse interaction: particles flee cursor ---- */
        let mouse = { x: -999, y: -999 };
        document.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function applyMouseRepulsion() {
            particles.forEach(p => {
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 80) {
                    const force = (80 - dist) / 80;
                    p.vx += (dx / dist) * force * 0.5;
                    p.vy += (dy / dist) * force * 0.5;
                    // Dampen velocity
                    p.vx *= 0.95;
                    p.vy *= 0.95;
                }
            });
            requestAnimationFrame(applyMouseRepulsion);
        }
        applyMouseRepulsion();
    </script>

</body>
</html>
